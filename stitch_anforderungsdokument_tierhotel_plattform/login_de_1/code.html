<!DOCTYPE html>

<html class="light" lang="de-CH"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Editorial Sanctuary | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-surface": "#263143",
                        "secondary": "#9d4300",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#002117",
                        "on-primary-fixed-variant": "#0b513d",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#80bea6",
                        "inverse-on-surface": "#ecf1ff",
                        "outline-variant": "#bfc9c3",
                        "surface-container": "#e7eeff",
                        "surface-tint": "#2b6954",
                        "surface-variant": "#d8e3fb",
                        "on-background": "#111c2d",
                        "on-tertiary-fixed": "#00201d",
                        "surface-container-low": "#f0f3ff",
                        "secondary-fixed": "#ffdbca",
                        "primary-fixed": "#b0f0d6",
                        "outline": "#707974",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#404944",
                        "secondary-fixed-dim": "#ffb690",
                        "surface-container-highest": "#d8e3fb",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#95d3ba",
                        "error-container": "#ffdad6",
                        "primary": "#003527",
                        "surface-dim": "#cfdaf2",
                        "tertiary-container": "#004d46",
                        "tertiary-fixed": "#89f5e7",
                        "tertiary": "#00342f",
                        "on-secondary-container": "#5c2400",
                        "primary-fixed-dim": "#95d3ba",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#005049",
                        "secondary-container": "#fd761a",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-container-high": "#dee8ff",
                        "on-surface": "#111c2d",
                        "on-tertiary-container": "#53c2b5",
                        "tertiary-fixed-dim": "#6bd8cb",
                        "primary-container": "#064e3b",
                        "surface": "#f9f9ff",
                        "surface-bright": "#f9f9ff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#341100"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #003527 0%, #064e3b 100%);
        }
        .glass-effect {
            background: rgba(216, 227, 251, 0.6);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Warme, sonnendurchflutete Lobby eines Tierhotels mit weichen Holzstrukturen und einem schlafenden Golden Retriever" class="w-full h-full object-cover opacity-15 grayscale-[0.2]" data-alt="Interior of a luxury pet hotel lounge with warm morning sunlight, natural wood finishes, and a peaceful golden retriever resting on a soft rug" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmtk5DN-pdM7-i_0JhqNLphb5TiGBUKFY1if1cQ_F-ndgjP7cmk8GDDRD817bVQTZOViDcTyNV3-uCcJNVgzw2obwgLsqwNVswTE4Km_Hf-mAVuymy_6PaDMDuAADQgr1nptTOCA0gVcp_wgDNkyMLFSOW7-5UDgz2xVl6fNnt-AoRslcG38DhrhkdhWXzn3uWRDZyvrM5fJVyBkHN7bm9dzUA7FXKPJrafQx_w26r5tnFezbIVfSnUDIpaAS9zLnIj9b2x4UK6Fk"/>
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-transparent to-surface-container-low opacity-80"></div>
</div>
<main class="relative z-10 w-full max-w-md px-6">
<div class="surface-container-lowest rounded-xl shadow-[0_20px_40px_rgba(17,28,45,0.06)] overflow-hidden">
<div class="p-8 pt-12 md:p-10 md:pt-14">
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-fixed rounded-xl flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="pets">pets</span>
</div>
<h1 class="font-headline text-2xl font-extrabold text-primary tracking-tighter mb-1">The Sanctuary</h1>
<p class="text-on-surface-variant font-label text-xs uppercase tracking-widest text-center">Plattform für Tierbetreuung &amp; Redaktion</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="email">E-Mail-Adresse</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-none rounded-lg text-on-surface placeholder-outline focus:ring-2 focus:ring-primary-container text-sm transition-all" id="email" name="email" placeholder="mitarbeitende@thesanctuary.ch" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Passwort</label>
<a class="text-secondary text-xs font-medium hover:underline transition-all" href="#">Passwort vergessen?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-none rounded-lg text-on-surface placeholder-outline focus:ring-2 focus:ring-primary-container text-sm transition-all" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-container-low" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium" for="remember">Angemeldet bleiben</label>
</div>
<button class="w-full hero-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Anmelden
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-10 pt-8 border-t border-outline-variant/15 text-center">
<p class="text-sm text-on-surface-variant">
                        Nur interner Zugriff. 
                        <span class="block mt-1 font-label text-[10px] uppercase tracking-tighter opacity-50">Identität für autorisierte Mitarbeitende erforderlich</span>
</p>
</div>
</div>
</div>
<div class="mt-8 flex justify-center gap-6">
<a class="text-outline text-xs hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
                Sicherheitsrichtlinien
            </a>
<a class="text-outline text-xs hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm" data-icon="help">help</span>
                Support für Mitarbeitende
            </a>
</div>
</main>
<div class="fixed bottom-6 right-6 z-20">
<div class="glass-effect p-3 rounded-full flex items-center gap-3 pr-5 shadow-lg shadow-on-surface/5">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="support_agent">support_agent</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-label font-bold text-on-surface-variant leading-none uppercase tracking-wider">Systemstatus</span>
<span class="text-xs font-semibold text-primary-container flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary-fixed-dim inline-block"></span>
                    Betriebsbereit
                </span>
</div>
</div>
</div>
</body></html>
